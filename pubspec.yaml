name: firebase_dynamic_links_fixed
description: >-
  Flutter plugin for Google Dynamic Links for Firebase. Supports firebase_core ^4.4.0,
  Flutter 3.x, Dart 3, null safety, AGP 8+, and Kotlin 1.9+.
version: 1.0.2

repository: https://github.com/ChaiwaT-Sun/firebase_dynamic_links_fixed
issue_tracker: https://github.com/ChaiwaT-Sun/firebase_dynamic_links_fixed/issues
homepage: https://github.com/ChaiwaT-Sun/firebase_dynamic_links_fixed

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

false_secrets:
  - /example/android/app/google-services.json
  - /example/ios/Runner/GoogleService-Info.plist

flutter:
  plugin:
    platforms:
      android:
        package: io.flutter.plugins.firebasedynamiclinks
        pluginClass: FirebaseDynamicLinksPlugin
      ios:
        pluginClass: FLTFirebaseDynamicLinksPlugin
